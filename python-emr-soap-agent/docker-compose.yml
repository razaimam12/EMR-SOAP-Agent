services:
  emr-soap:
    build: .
    container_name: emr-soap-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3}
    restart: unless-stopped
